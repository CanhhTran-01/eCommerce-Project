<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" href="../assets/icons/favicon.jpg">
    <title>Update Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container vh-100 d-flex justify-content-center align-items-center">

        <div class="card shadow w-100" style="max-width:420px;">
            <div class="card-body">

                <div class="text-center mb-4">
                    <h3 class="fw-bold text-danger">eCommerce</h3>
                    <div class="text-muted">Thay đổi mật khẩu</div>
                </div>

                <!-- STEP 1 EMAIL -->
                <div class="step" id="step1">
                    <h5 class="mb-3">Nhập email</h5>
                    <input type="email" class="form-control mb-3" id="email" placeholder="Email">
                    <button id="btn-send-email" class="btn btn-danger w-100">Tiếp tục</button>
                </div>

                <!-- STEP 2 OTP -->
                <div class="step d-none" id="step2">
                    <h5 class="mb-3">Xác minh email</h5>

                    <div class="small text-muted mb-2" id="notifyOtpSending"></div>

                    <input type="text" maxlength="6" class="form-control text-center mb-3" id="otp" placeholder="OTP">

                    <button id="btn-verify-otp" class="btn btn-danger w-100">Yêu cầu OTP</button>
                    <div class="d-flex justify-content-center align-items-center d-none" id="waittingOtp">
                        <div class="spinner-border m-2"></div>Chờ xử lý...
                    </div>
                </div>

                <!-- STEP 3 USERNAME -->
                <div class="step d-none" id="step3">
                    <h5 class="mb-3">Nhập username</h5>

                    <input type="password" class="form-control mb-3" id="oldPassword" placeholder="New Password">
                    <input type="password" class="form-control mb-3" id="newPassword" placeholder="New Password">
                    <input type="password" class="form-control mb-3" id="confirmNewPassword"
                        placeholder="Confirm New Password">

                    <button id="btn-reset-password" class="btn btn-danger w-100">Gửi yêu cầu mật khẩu mới</button>
                    <div class="d-flex justify-content-center align-items-center d-none" id="waittingSendNewPass">
                        <div class="spinner-border m-2"></div>Loading...
                    </div>
                </div>

                <div class="text-center mt-3 small">
                    <a href="../pages/login.html">Quay lại đăng nhập</a>
                </div>

            </div>
        </div>

    </div>


    <!-- Script -->
    <script type="module" src="../js/pages/update-password.js"></script>
</body>

</html>
