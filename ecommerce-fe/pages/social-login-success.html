<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <link rel="icon"
        href="https://res.cloudinary.com/djw4qdufh/image/upload/v1772176743/avatar/68233591-df58-44e2-a7e4-ad296bef7dfd_favicon-ecommerce.webp">
    <title>Signing you in...</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="d-flex vh-100 justify-content-center align-items-center">
        <div class="card shadow-sm p-4 text-center" style="width: 360px; border-radius: 16px;">
            <div class="spinner-border text-primary mb-3" role="status"></div>

            <h5 class="mb-2">Đang xử lý</h5>
            <p class="text-muted small mb-0">Xin vui lòng chờ đăng nhập để vào trang...</p>
        </div>
    </div>

    <script>
        handleSocialLoginSuccess();
        function handleSocialLoginSuccess() {
            const params = new URLSearchParams(window.location.search);
            const encodedToken = params.get("token");

            const token = decodeURIComponent(encodedToken);

            setTimeout(() => {
                if (token) {
                    localStorage.setItem("access_token", token);

                    // clear URL query
                    window.history.replaceState({}, document.title, window.location.pathname);

                    // redirect app
                    window.location.href = window.location.origin + '/ecommerce-fe/pages/index.html';

                } else {
                    alert("Đăng nhập không thành công !");
                    window.location.href = window.location.origin + '/ecommerce-fe/pages/login.html';
                }
            }, 1000);
        }
    </script>

</body>

</html>
