<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title> Đăng nhập </title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/main.css">
</head>

<body class="bg-light">
    <div class="login-container">
        <div class="login-wrapper">
            <!-- Left Side - Branding (Desktop Only) -->
            <div class="login-brand d-none d-lg-flex">
                <div class="brand-content">
                    <h1 class="brand-title">eCommerce</h1>
                    <p class="brand-subtitle">Cảm ơn vì đã đến !</p>
                    <img src="../assets/images/login-banner.png" alt="Shopping Banner" class="brand-image">
                </div>
            </div>

            <!-- Right Side - Login Form -->
            <div class="login-form-section">
                <div class="login-form-wrapper">
                    <!-- Title -->
                    <div class="login-header">
                        <h2>LOGIN</h2>
                        <p>Sign in to your account</p>
                    </div>

                    <form id="loginForm" class="login-form">
                        <!-- Username Input -->
                        <div class="form-group">
                            <label for="username" class="form-label">Username or phone number</label>
                            <input type="text" class="form-control" id="username" placeholder="Enter your username or phone number"
                                required>
                        </div>

                        <!-- Password Input -->
                        <div class="form-group">
                            <label for="password" class="form-label">Password</label>
                            <div class="password-input-group">
                                <input type="password" class="form-control" id="password"
                                    placeholder="Enter your password" required>
                                <button type="button" class="btn-show-password" id="togglePassword">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <small class="form-text text-danger d-none" id="passwordError"></small>
                        </div>

                        <!-- Remember Me & Forgot Password -->
                        <div class="form-group form-options">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberMe">
                                <label class="form-check-label" for="rememberMe">Remember me</label>
                            </div>
                            <a href="#" class="forgot-password-link">Forgot password?</a>
                        </div>

                        <!-- Login Button -->
                        <button type="submit" class="btn btn-login btn-block">Login</button>

                        <!-- Divider -->
                        <div class="divider">
                            <span>OR</span>
                        </div>

                        <!-- Social Login -->
                        <div class="social-login">
                            <button type="button" class="btn btn-social btn-google">
                                <i class="fab fa-google"></i> Google
                            </button>
                            <button type="button" class="btn btn-social btn-facebook">
                                <i class="fab fa-facebook-f"></i> Facebook
                            </button>
                        </div>

                        <!-- Sign Up Link -->
                        <div class="signup-link">
                            <p>Don't have an account? <a href="register.html">Sign up</a></p>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/main.js"></script>
    <script type="module" src="../js/pages/login.js"></script>
</body>

</html>
