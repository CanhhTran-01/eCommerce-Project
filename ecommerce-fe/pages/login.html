<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon"
        href="https://res.cloudinary.com/djw4qdufh/image/upload/v1772176743/avatar/68233591-df58-44e2-a7e4-ad296bef7dfd_favicon-ecommerce.webp">
    <title> Đăng nhập | eCommerce </title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/common/main.css" />
</head>

<body class="login-bg">

    <div class="login-container">
        <div class="login-wrapper">
            <div class="login-form-section">
                <div class="login-form-wrapper">
                    <!-- Title -->
                    <div class="login-header">
                        <h2>LOGIN</h2>
                        <p>Đăng nhập vào tài khoản của bạn</p>
                    </div>

                    <form id="loginForm" class="login-form">
                        <!-- Username Input -->
                        <div class="form-group">
                            <label for="username" class="form-label">Tên đăng nhập</label>
                            <input type="text" class="form-control" id="username"
                                placeholder="Nhập tên đăng nhập của bạn..." required>
                        </div>

                        <!-- Password Input -->
                        <div class="form-group">
                            <label for="password" class="form-label">Mật khẩu</label>
                            <div class="password-input-group">
                                <input type="password" class="form-control" id="password"
                                    placeholder="Nhập mật khẩu..." required>
                                <button type="button" class="btn-show-password" id="togglePassword">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <small class="form-text text-danger d-none" id="passwordError"></small>
                        </div>

                        <!-- Remember Me & Forgot Password -->
                        <div class="form-group form-options">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberMe">
                                <label class="form-check-label" for="rememberMe">Remember me</label>
                            </div>
                            <a href="../pages/forgot-password.html" class="forgot-password-link">Quên mật khẩu?</a>
                        </div>

                        <!-- Login Button -->
                        <button type="submit" class="btn btn-login btn-block">Đăng nhập</button>

                        <!-- Divider -->
                        <div class="divider">
                            <span>Hoặc đăng nhập với</span>
                        </div>

                        <!-- Social Login -->
                        <div class="social-login">
                            <button type="button" class="btn btn-social btn-google" id="loginWithGoogle">
                                <i class="fab fa-google"></i> Google
                            </button>
                            <button type="button" class="btn btn-social btn-facebook" id="loginWithFacebook">
                                <i class="fab fa-facebook-f"></i> Facebook</a>
                            </button>
                        </div>

                        <!-- Sign Up Link -->
                        <div class="signup-link">
                            <p>Chưa có tài khoản? <a href="register.html">Đăng ký</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>


    <!-- Scripts -->
    <script src="../js/common/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/pages/login.js"></script>
</body>

</html>
