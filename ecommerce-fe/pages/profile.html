<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <link rel="icon" href="../assets/icons/favicon.jpg">
    <title> Tài khoản của tôi </title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/common/main.css" />
</head>

<body>

    <div class="container page-account">
        <div class="account-layout">
            <aside class="account-sidebar">
                <div class="sidebar-profile">
                    <div class="avatar" id="avatar">
                        <!--avt will be insterted here-->
                    </div>
                    <div id="nickName">
                        <!-- nick name will be inserted here -->
                    </div>
                </div>
                <nav class="sidebar-nav">
                    <a href="../pages/profile.html" class="active">Tổng quan</a>
                    <a href="../pages/my-orders.html">Đơn hàng của tôi</a>
                    <a href="../pages/wishlist.html">Danh sách yêu thích</a>
                    <a href="#"> Đăng kí dịch vụ eCommerce</a>
                    <a href="../pages/index.html">Về trang chủ</a>
                    <a id="logoutLinkInProfile"> Đăng xuất </a>
                </nav>
            </aside>

            <main class="account-main">
                <div id="accountAccordion">
                    <!-- Profile Info Card -->
                    <div class="card">
                        <div class="card-header">
                            <a class="btn" data-bs-toggle="collapse" href="#collapseProfile">
                                <i class="fas fa-user"></i> Thông tin người dùng
                            </a>
                        </div>

                        <div id="collapseProfile" class="collapse show" data-bs-parent="#accountAccordion">
                            <div class="card-body">
                                <div id="profileBox" class="profile-box">
                                    <!-- Profile Info will be inserted here -->
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Avatar display Card -->
                    <div class="card">
                        <div class="card-header">
                            <a class="btn" data-bs-toggle="collapse" href="#collapseAvatarDisplay"
                                id="avatarDisplayBtn">
                                <i class="fas fa-image"></i> Ảnh đại diện
                            </a>
                        </div>

                        <div id="collapseAvatarDisplay" class="collapse" data-bs-parent="#accountAccordion">
                            <div class="card-body">

                                <!-- Avatar preview -->
                                <div class="text-center mb-3">
                                    <img id="avatarImg" src="" class="rounded-circle" width="400" height="400"
                                        style="object-fit: cover;">
                                </div>

                                <!-- Upload area -->
                                <div class="text-center">
                                    <input type="file" id="avatarInput" hidden>
                                    <button class="btn btn-primary" id="uploadBtn">
                                        Cập nhật ảnh mới
                                    </button>
                                </div>

                                <!-- Spinner -->
                                <div id="avatarSpinner" class="mt-2" style="display:none;">
                                    <div class="spinner-border text-primary" role="status"></div>
                                </div>

                            </div>
                        </div>
                    </div>

                    <!-- Purchase History Card -->
                    <div class="card">
                        <div class="card-header">
                            <a class="collapsed btn" data-bs-toggle="collapse" href="#collapseOrders"
                                id="purchaseHistoryLink">
                                <i class="fas fa-history"></i> Lịch sử mua hàng
                            </a>
                        </div>
                        <div id="collapseOrders" class="collapse" data-bs-parent="#accountAccordion">
                            <div class="card-body">
                                <div id="puschaseHistory">
                                    <!-- Purchase history will be inserted here -->
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>


    <!-- Scripts -->
    <script src="../js/common/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/pages/profile.js"></script>
</body>

</html>
