<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <link rel="icon" href="../assets/icons/favicon.jpg">
    <title> Tài khoản của tôi </title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/common/main.css"/>
</head>

<body>
    
    <div class="container page-account">
        <div class="account-layout">
            <aside class="account-sidebar">
                <div class="sidebar-profile">
                    <div class="avatar">
                        <img src="../assets/icons/avatar-test.jpg" alt="avatar">
                    </div>
                    <div>
                        <h5 id="nickName"></h5>
                    </div>
                    <div class="profile-actions">
                        <button id="editProfileBtn" class="btn-edit-profile"> Chỉnh sửa </button>
                    </div>
                </div>
                <nav class="sidebar-nav">
                    <a href="account-info.html" class="active">Tổng quan</a>
                    <a href="my-orders.html">Đơn hàng của tôi</a>
                    <a href="wishlist.html">Yêu thích</a>
                    <a href="./index.html">Trang chủ</a>
                    <a id="logoutBtn">Đăng xuất</a>
                </nav>
            </aside>

            <main class="account-main">
                <div id="accountAccordion">
                    <!-- Profile Info Card -->
                    <div class="card">
                        <div class="card-header">
                            <a class="btn" data-bs-toggle="collapse" href="#collapseProfile">
                                <i class="fas fa-user"></i> Thông tin tài khoản
                            </a>
                        </div>

                        <div id="collapseProfile" class="collapse show" data-bs-parent="#accountAccordion">
                            <div class="card-body">
                                <div id="profileBox" class="profile-box"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Recent Orders Card -->
                    <div class="card">
                        <div class="card-header">
                            <a class="collapsed btn" data-bs-toggle="collapse" href="#collapseOrders">
                                <i class="fas fa-shopping-bag"></i> Đơn hàng gần đây
                            </a>
                        </div>
                        <div id="collapseOrders" class="collapse" data-bs-parent="#accountAccordion">
                            <div class="card-body">
                                <div id="recentOrders">Đang tải...</div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>

        </div>
    </div>

    
    <!-- Scripts -->
    <script src="../js/common/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/pages/profile.js"></script>
</body>

</html>
