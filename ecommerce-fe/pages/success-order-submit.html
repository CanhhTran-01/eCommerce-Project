<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đặt hàng thành công | eCommerce</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container py-5">

        <div class="row justify-content-center">
            <div class="col-lg-6">

                <div class="card shadow-sm text-center">
                    <div class="card-body p-5">

                        <!-- Success Icon -->
                        <div class="mb-4">
                            <div class="rounded-circle bg-success bg-opacity-10 d-inline-flex align-items-center justify-content-center"
                                style="width:100px;height:100px;">
                                <span class="text-success fs-1 fw-bold">✓</span>
                            </div>
                        </div>

                        <h4 class="fw-bold text-success mb-3">
                            Đặt hàng thành công!
                        </h4>

                        <p class="text-muted mb-4">
                            Cảm ơn bạn đã mua hàng. Đơn hàng của bạn đang được xử lý.
                            Chúng tôi sẽ liên hệ với bạn sớm nhất.
                        </p>

                        <hr>

                        <!-- Order Info -->
                        <div class="text-start mt-4 mb-4">
                            <div class="d-flex justify-content-between mb-2">
                                <span>Mã đơn hàng</span>
                                <strong id="orderCode"></strong>
                            </div>

                            <div class="d-flex justify-content-between mb-2">
                                <span>Tổng thanh toán</span>
                                <strong class="text-danger" id="totalCheckout"></strong>
                            </div>

                            <div class="d-flex justify-content-between mb-2">
                                <span>Phương thức thanh toán</span>
                                <strong id="paymentMethod"></strong>
                            </div>

                            <div class="d-flex justify-content-between">
                                <span>Phương thức vận chuyển</span>
                                <strong id="shippingMethod"></strong>
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <a href="index.html" class="btn btn-primary fw-semibold">
                                Tiếp tục mua sắm
                            </a>

                            <a href="profile.html" class="btn btn-outline-secondary">
                                Xem đơn hàng của tôi
                            </a>
                        </div>

                    </div>
                </div>

            </div>
        </div>

    </div>

    
    <!-- Script -->
    <script type="module" src="../js/pages/success-order-submit.js"></script>
</body>

</html>
