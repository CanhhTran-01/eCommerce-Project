<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>My Account</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome (optional icon) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-body-tertiary">

    <div class="container py-5">

        <div class="row justify-content-center">
            <div class="col-lg-5">

                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">

                    <!-- top banner -->
                    <div class="bg-primary-subtle text-center py-4">
                        <div class="bg-white rounded-circle shadow-sm d-inline-flex align-items-center justify-content-center"
                            style="width:70px;height:70px">
                            <i class="fa-solid fa-user fs-3 text-primary"></i>
                        </div>
                        <h5 class="mt-3 mb-0">Account Information</h5>
                        <small class="text-muted">Manage your personal account</small>
                    </div>

                    <!-- body -->
                    <div class="card-body p-4">

                        <!-- username -->
                        <div class="d-flex justify-content-between align-items-center py-2">
                            <div class="text-muted">Username:</div>
                            <div class="fw-semibold" id="username">...</div>
                        </div>

                        <hr class="my-2">

                        <!-- email -->
                        <div class="d-flex justify-content-between align-items-center py-2">
                            <div class="text-muted">Email:</div>
                            <div class="fw-semibold" id="email">...</div>
                        </div>

                        <hr class="my-2">

                        <!-- created -->
                        <div class="d-flex justify-content-between align-items-center py-2">
                            <div class="text-muted">Created at:</div>
                            <div class="fw-semibold" id="createdAt">...</div>
                        </div>

                        <!-- button -->
                        <div class="d-grid mt-4">
                            <a href="../pages/update-password.html" class="btn btn-primary rounded-3">
                                <i class="fa-solid fa-key me-2"></i>
                                Update Password
                            </a>
                        </div>

                    </div>

                </div>

            </div>
        </div>

    </div>


    <!-- Script -->
    <script type="module" src="../js/pages/my-account.js"></script>

</body>

</html>
