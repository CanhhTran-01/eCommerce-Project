<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="icon" href="../assets/icons/favicon.jpg">
    <title> Sale | eCommerce </title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/common/main.css"/>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-top">
        <div class="container-fluid navbar-container">
            <!-- Logo -->
            <a class="navbar-logo" href="./index.html">
                <i class="fas fa-shopping-bag"></i>
                <span>eCommerce</span>
            </a>

            <!-- Search Bar -->
            <div class="search-box-wrapper d-none d-lg-block">
                <div class="search-box">
                    <input type="text" class="search-input" placeholder="Search products, brands and more..."
                        id="searchInput">
                    <button class="search-btn">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
            </div>

            <!-- Right Actions -->
            <div class="navbar-actions">
                <div class="action-item">
                    <button class="btn-action" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="badge-count" id="cartCount">0</span>
                    </button>
                </div>

                <div class="action-item">
                    <button class="btn-action">
                        <i class="fas fa-heart"></i>
                        <span class="badge-count">0</span>
                    </button>
                </div>

                <div class="action-item dropdown">
                    <button class="btn-action dropdown-toggle" data-bs-toggle="dropdown">
                        <i class="fas fa-user"></i>
                    </button>

                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" id="infoLink"><i class="fas fa-user"></i> Profile</a></li>
                        <li><a class="dropdown-item" id="myOrdersLink"><i class="fas fa-box"></i> My Orders</a></li>
                        <li><a class="dropdown-item" id="wishListLink"><i class="fas fa-heart"></i> Wishlist</a></li>

                        <li>
                            <hr class="dropdown-divider">
                        </li>

                        <li><a class="dropdown-item text-danger" id="loginLink"><i class="fas fa-sign-in-alt"></i>
                                Login</a>
                        </li>
                        <li><a class="dropdown-item text-danger d-none" id="logoutLink"><i class="fas fa-sign-out-alt"></i>
                                Logout</a>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- Mobile Search Toggle -->
            <button class="btn-mobile-search d-lg-none">
                <i class="fas fa-search"></i>
            </button>
        </div>
    </nav>

    <!-- Cart Offcanvas -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="cartOffcanvas">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title">Shopping Cart</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <div id="cartContent" class="cart-content">
                <p class="text-muted text-center">Your cart is empty</p>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container my-4">

            <!-- HEADER BANNER -->
            <div class="flash-header mb-3">
                <img src="https://dummyimage.com/1200x300/ff5722/ffffff&text=FLASH+SALE" class="img-fluid" />
            </div>

            <!-- TIME BAR -->
            <div class="row g-0 mb-3">
                <div class="col flash-time active">
                    <strong>12:00</strong>
                    <span>Đang diễn ra</span>
                </div>
                <div class="col flash-time">
                    <strong>15:00</strong>
                    <span>Sắp diễn ra</span>
                </div>
                <div class="col flash-time">
                    <strong>17:00</strong>
                    <span>Sắp diễn ra</span>
                </div>
                <div class="col flash-time">
                    <strong>19:00</strong>
                    <span>Sắp diễn ra</span>
                </div>
                <div class="col flash-time">
                    <strong>21:00</strong>
                    <span>Sắp diễn ra</span>
                </div>
            </div>

            <!-- TAB MENU -->
            <div class="flash-tabs mb-4">
                <a href="#" class="active">Top sản phẩm nổi bật</a>
            </div>

            <!-- LIST SALE PRODUCT -->
            <div class="products-grid" id="saleProductList">
                <!-- Sale products will be rendered here -->
            </div>

        </div>
    </main>


    <!-- Scripts -->
    <script src="../js/common/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/components/navbar.js"></script>
    <script type="module" src="../js/pages/sale-products.js"></script>
</body>

</html>
