<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Thanh toán | eCommerce</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container py-5">
        <h3 class="mb-4 fw-bold"> Thanh toán </h3>

        <div class="row g-4">

            <!-- LEFT COLUMN -->
            <div class="col-lg-8">

                <!-- Receiver Info -->
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h6 class="fw-semibold mb-3">Thông tin người nhận</h6>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <input type="text" class="form-control" placeholder="Họ và tên" id="name">
                            </div>
                            <div class="col-md-6">
                                <input type="text" class="form-control" placeholder="Số điện thoại" id="phone">
                            </div>
                            <div class="col-12">
                                <textarea class="form-control" rows="2" placeholder="Địa chỉ cụ thể"
                                    id="address"></textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Products -->
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h6 class="fw-semibold mb-3">Sản phẩm</h6>

                        <!-- Order Item 1 -->
                        <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-3">
                            <!-- LEFT: image + info -->
                            <div class="d-flex align-items-center">
                                <img src="" class="img-thumbnail me-3" style="width:70px;height:70px;object-fit:cover;">
                                <div>
                                    <div class="fw-semibold" id="productName">Áo thun nam</div>
                                    <small class="text-muted">
                                        Số lượng: <span id="quantity">1</span>
                                    </small>
                                </div>
                            </div>

                            <!-- RIGHT: price -->
                            <div class="text-danger fw-bold" id="price">200.000₫</div>
                        </div>

                        <!-- Order Item 2 -->
                        <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-3">
                            <!-- LEFT: image + info -->
                            <div class="d-flex align-items-center">
                                <img src="" class="img-thumbnail me-3" style="width:70px;height:70px;object-fit:cover;">
                                <div>
                                    <div class="fw-semibold" id="productName">Áo thun nam</div>
                                    <small class="text-muted">
                                        Số lượng: <span id="quantity">1</span>
                                    </small>
                                </div>
                            </div>

                            <!-- RIGHT: price -->
                            <div class="text-danger fw-bold" id="price">200.000₫</div>
                        </div>

                        <!-- Order Item 3 -->
                        <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-3">
                            <!-- LEFT: image + info -->
                            <div class="d-flex align-items-center">
                                <img src="" class="img-thumbnail me-3" style="width:70px;height:70px;object-fit:cover;">
                                <div>
                                    <div class="fw-semibold" id="productName">Áo thun nam</div>
                                    <small class="text-muted">
                                        Số lượng: <span id="quantity">1</span>
                                    </small>
                                </div>
                            </div>

                            <!-- RIGHT: price -->
                            <div class="text-danger fw-bold" id="price">200.000₫</div>
                        </div>

                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN -->
            <div class="col-lg-4">
                <div class="card shadow-sm sticky-top" style="top: 20px;">
                    <div class="card-body">

                        <h6 class="fw-semibold mb-3">Tóm tắt đơn hàng</h6>

                        <!-- NOTE -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Ghi chú cho người bán</label>
                            <textarea id="note" class="form-control" rows="2"
                                placeholder="Ví dụ: giao giờ hành chính..."></textarea>
                        </div>

                        <!-- SHIPPING METHOD -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Phương thức vận chuyển</label>

                            <div class="form-check">
                                <input class="form-check-input shipping-option" type="radio" name="shipping"
                                    value="STANDARD" data-fee="30000" checked>
                                <label class="form-check-label">
                                    Standard (30.000₫)
                                </label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input shipping-option" type="radio" name="shipping"
                                    value="FAST" data-fee="50000">
                                <label class="form-check-label">
                                    Fast (50.000₫)
                                </label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input shipping-option" type="radio" name="shipping"
                                    value="SUPER_FAST" data-fee="80000">
                                <label class="form-check-label">
                                    Super Fast (80.000₫)
                                </label>
                            </div>
                        </div>

                        <hr>

                        <div class="d-flex justify-content-between mb-2">
                            <span>Tổng tiền sản phẩm</span>
                            <strong id="subtotal">200.000₫</strong>
                        </div>

                        <div class="d-flex justify-content-between mb-2">
                            <span>Phí vận chuyển</span>
                            <strong id="shippingFee">30.000₫</strong>
                        </div>

                        <hr>

                        <div class="d-flex justify-content-between fs-5 fw-bold text-danger mb-3">
                            <span>Tổng thanh toán</span>
                            <span id="total">230.000₫</span>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Phương thức thanh toán</label>
                            <select id="paymentMethod" class="form-select">
                                <option value="COD">Thanh toán khi nhận hàng (COD)</option>
                                <option value="BANK">Chuyển khoản (chưa hỗ trợ)</option>
                            </select>
                        </div>

                        <button class="btn btn-primary w-100 fw-semibold" id="submitOrderBtn">Đặt hàng</button>
                        <span id="btnSpinner" class="spinner-border spinner-border-sm ms-2 d-none"></span>
                    </div>
                </div>
            </div>

        </div>
    </div>


    <!-- Script -->
    <script type="module" src="../js/pages/checkout.js"></script>
</body>

</html>
