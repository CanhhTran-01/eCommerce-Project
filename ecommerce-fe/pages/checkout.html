<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <link rel="icon" href="../assets/icons/favicon.jpg">
    <title>Thanh toán | eCommerce</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 24px 0;
            color: #222;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: #fff;
            padding: 24px 32px;
            border-radius: 4px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
        }

        h1 {
            font-size: 22px;
            margin-bottom: 20px;
            color: #ee4d2d;
        }

        .section {
            border-bottom: 1px solid #eee;
            padding: 20px 0;
        }

        .section:last-child {
            border-bottom: none;
        }

        .section h2 {
            font-size: 16px;
            margin-bottom: 14px;
            font-weight: 600;
        }

        .row {
            display: flex;
            gap: 16px;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 2px;
            font-size: 14px;
        }

        textarea {
            resize: vertical;
        }

        .product {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
        }

        .product-name {
            font-weight: 600;
            margin-bottom: 6px;
        }

        .product-meta {
            font-size: 13px;
            color: #666;
        }

        .product-price {
            color: #ee4d2d;
            font-weight: 600;
        }

        .summary {
            background: #fafafa;
            padding: 16px;
            border-radius: 2px;
            font-size: 14px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .summary-row.total {
            font-size: 18px;
            font-weight: 600;
            color: #ee4d2d;
        }

        .footer {
            display: flex;
            justify-content: flex-end;
            margin-top: 24px;
        }

        .btn {
            background: #ee4d2d;
            color: #fff;
            padding: 14px 40px;
            border: none;
            border-radius: 2px;
            font-size: 15px;
            cursor: pointer;
        }

        .btn:hover {
            opacity: 0.95;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Thanh toán</h1>

        <div class="section">
            <h2> Thông tin người nhận </h2>
            <div class="row">
                <input type="text" placeholder="Họ và tên" id="name" />
                <input type="text" placeholder="Số điện thoại" id="phone" />
            </div>
            <br />
            <textarea rows="3" placeholder="Địa chỉ cụ thể" id="address"></textarea>
        </div>

        <div class="section">
            <h2>Sản phẩm</h2>
            <div class="product">
                <div>
                    <div class="product-name" id="productName">Áo thun nam</div>
                    <div class="product-meta">Số lượng: <span id="quantity">1</span></div>
                </div>
                <div class="product-price" id="price">200.000₫</div>
            </div>
        </div>

        <div class="section">
            <h2>Phương thức thanh toán</h2>
            <select id="paymentMethod">
                <option value="COD">Thanh toán khi nhận hàng</option>
                <option value="BANK">Chuyển khoản ngân hàng (tính năng chưa sẵn có)</option>
            </select>
        </div>

        <div class="section summary">
            <div class="summary-row">
                <span>Tạm tính</span>
                <strong id="subtotal">200.000₫</strong>
            </div>
            <div class="summary-row">
                <span>Phí vận chuyển</span>
                <strong>30.000₫</strong>
            </div>
            <div class="summary-row total">
                <span>Tổng thanh toán</span>
                <span>230.000₫</span>
            </div>
        </div>

        <div class="footer">
            <button class="btn" onclick="submitOrder()">Đặt hàng</button>
        </div>
    </div>

    <script>
        const orderData = {
            productId: 1,
            name: 'Áo thun nam',
            price: 200000,
            quantity: 1
        };

        function formatPrice(v) {
            return v.toLocaleString('vi-VN') + '₫';
        }

        function initPage() {
            document.getElementById('productName').textContent = orderData.name;
            document.getElementById('quantity').textContent = orderData.quantity;
            document.getElementById('price').textContent = formatPrice(orderData.price);
            document.getElementById('subtotal').textContent = formatPrice(orderData.price * orderData.quantity);
        }

        function submitOrder() {
            const payload = {
                receiverName: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                paymentMethod: document.getElementById('paymentMethod').value,
                items: [
                    { productId: orderData.productId, quantity: orderData.quantity }
                ]
            };

            console.log('Submit order payload:', payload);
            alert('Đặt hàng thành công');
        }

        initPage();
    </script>
</body>

</html>
