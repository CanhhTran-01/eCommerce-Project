<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" href="../assets/icons/favicon.jpg">
    <title>Forgot Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/pages/forgot-pass.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container vh-100 d-flex justify-content-center align-items-center">

        <div class="card shadow w-100" style="max-width:420px;">
            <div class="card-body">

                <div class="text-center mb-4">
                    <h3 class="fw-bold text-danger">eCommerce</h3>
                    <div class="text-muted">Lấy lại mật khẩu</div>
                </div>

                <!-- STEP 1 EMAIL -->
                <div class="step" id="step1">
                    <h5 class="mb-3">Nhập email</h5>
                    <input type="email" class="form-control mb-3" id="email" placeholder="Email">
                    <button id="btn-send-email" class="btn btn-danger w-100">Tiếp tục</button>
                </div>

                <!-- STEP 2 OTP -->
                <div class="step d-none" id="step2">
                    <h5 class="mb-3">Nhập mã xác thực</h5>

                    <div class="small text-muted mb-2">
                        Mã xác nhận đã gửi tới email của bạn
                    </div>

                    <input type="text" maxlength="6" class="form-control text-center mb-3" id="otp" placeholder="OTP">

                    <button id="btn-verify-otp" class="btn btn-danger w-100">Xác nhận</button>
                </div>

                <!-- STEP 3 NEW PASSWORD -->
                <div class="step d-none" id="step3">
                    <h5 class="mb-3">Mật khẩu mới</h5>

                    <input type="password" class="form-control mb-3" id="newPassword" placeholder="Mật khẩu mới">
                    <input type="password" class="form-control mb-3" id="confirmPassword"
                        placeholder="Nhập lại mật khẩu">

                    <button id="btn-reset-password" class="btn btn-danger w-100">Đổi mật khẩu</button>
                </div>

                <div class="text-center mt-3 small">
                    <a href="../pages/login.html">Quay lại đăng nhập</a>
                </div>

            </div>
        </div>

    </div>

    
    <!-- Script -->
    <script type="module" src="../js/pages/forgot-password.js"></script>
</body>

</html>
